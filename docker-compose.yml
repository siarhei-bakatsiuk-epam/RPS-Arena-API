name: rps-arena

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rps-rabbit
    # Run as the image's rabbitmq user (uid 999) so the erlang cookie is written
    # and read by the same user (portable across Docker Desktop and rootless VMs).
    user: "999:999"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  matchservice:
    build:
      context: .
      dockerfile: src/MatchService/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=match_db;Username=postgres;Password=postgres"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  leaderboardservice:
    build:
      context: .
      dockerfile: src/LeaderboardService/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=leaderboard_db;Username=postgres;Password=postgres"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmqdata:
